<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VELOCITY: NATIVE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; text-shadow: 2px 2px 2px #000; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1 id="speed">VELOCITY: 0</h1>
        <p>CLICK to play | WASD to move | SPACE to jump</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Player state
        const p = { x: 0, y: 10, z: 0, vx: 0, vy: 0, vz: 0, isGrounded: false };
        const platforms = [];

        // Level Gen
        function addPlat(x,y,z,w,d, color, isBoost) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 2, d), new THREE.MeshLambertMaterial({color}));
            mesh.position.set(x, y, z);
            scene.add(mesh);
            platforms.push({x, y, z, w, d, isBoost});
        }

        addPlat(0, -2, 0, 40, 40, 0xffffff); // Start
        for(let i=0; i<20; i++) addPlat(0, -2, -60 - (i*40), 20, 30, (i%3===0?0x00ff00:0x333333), i%3===0);

        scene.add(new THREE.DirectionalLight(0xffffff, 1));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        let keys = {}, yaw = 0, pitch = 0;
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        document.body.onclick = () => document.body.requestPointerLock();
        document.onmousemove = e => { if(document.pointerLockElement) { yaw -= e.movementX*0.002; pitch = Math.max(-1, Math.min(1, pitch - e.movementY*0.002)); } };

        function animate() {
            requestAnimationFrame(animate);
            
            // Movement
            const fwd = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0, yaw, 0));
            const right = new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0, yaw, 0));
            if(keys['KeyW']) { p.vx += fwd.x*0.05; p.vz += fwd.z*0.05; }
            if(keys['KeyS']) { p.vx -= fwd.x*0.05; p.vz -= fwd.z*0.05; }
            if(keys['Space'] && p.isGrounded) p.vy = 0.4;

            p.vx *= 0.9; p.vz *= 0.9; p.vy -= 0.02;
            p.x += p.vx; p.y += p.vy; p.z += p.vz;

            // Collision
            p.isGrounded = false;
            platforms.forEach(plat => {
                if(Math.abs(p.x - plat.x) < plat.w/2 && Math.abs(p.z - plat.z) < plat.d/2 && Math.abs(p.y - plat.y) < 2) {
                    p.y = plat.y + 2; p.vy = 0; p.isGrounded = true;
                    if(plat.isBoost) p.vx *= 2;
                }
            });

            if(p.y < -50) { p.x=0; p.y=10; p.z=0; p.vx=0; p.vy=0; p.vz=0; }

            camera.position.set(p.x, p.y+1, p.z);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            document.getElementById('speed').innerText = "VELOCITY: " + Math.floor(Math.sqrt(p.vx**2 + p.vz**2)*100);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
