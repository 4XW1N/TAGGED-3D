<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VELOCITY: DAYLIGHT EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        #hud { position: absolute; top: 20px; left: 20px; color: #111; pointer-events: none; z-index: 10; font-weight: 900;}
        .hud-stat { font-size: 2rem; margin-bottom: 5px; text-transform: uppercase; text-shadow: 2px 2px 0px #fff; }
        #speedDisplay { color: #ff0055; font-size: 3rem; }
        #instructions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #111; font-size: 1.2rem; font-weight: bold; background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 5px; pointer-events: none; text-align: center;}
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"></script>
</head>
<body>

    <div id="hud">
        <div class="hud-stat" id="speedDisplay">VELOCITY: 0</div>
        <div class="hud-stat" id="scoreDisplay">STYLE: 0</div>
    </div>
    <div id="instructions">
        Click to Lock Mouse | WASD: Move | SPACE: Jump<br>
        Run onto Green Pads to Boost!
    </div>
    
    <script>
        // --- 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Bright daylight sky
        scene.fog = new THREE.Fog(0x87CEEB, 10, 400); // Light fog so you can see far
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -25, 0) });

        // Friction material
        const physicsMaterial = new CANNON.Material("standard");
        const contactMaterial = new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, { friction: 0.05, restitution: 0 });
        world.addContactMaterial(contactMaterial);

        // --- 2. LIGHTING & GRID (To guarantee you see the world) ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // A massive grid way down below so you know where "death" is
        const grid = new THREE.GridHelper(1000, 50, 0x000000, 0x000000);
        grid.position.y = -100;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- 3. PLAYER SETUP ---
        const playerBody = new CANNON.Body({
            mass: 5,
            shape: new CANNON.Sphere(1),
            material: physicsMaterial,
            linearDamping: 0.1,
            fixedRotation: true 
        });
        playerBody.position.set(0, 10, 0); // Drop in from above safely
        world.addBody(playerBody);

        // --- 4. FOOLPROOF LEVEL GENERATION ---
        const platforms = [];
        let currentZ = 0;

        function createPlatform(x, y, z, w, h, d, color, isBoost = false) {
            // Three.js visual
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshLambertMaterial({ color: color })
            );
            mesh.position.set(x, y, z);
            scene.add(mesh);

            // Cannon.js physics
            const body = new CANNON.Body({ mass: 0, material: physicsMaterial });
            body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
            body.position.copy(mesh.position);
            body.userData = { isBoost: isBoost };
            world.addBody(body);
        }

        // MASSIVE safe starting platform
        createPlatform(0, -2, -20, 30, 4, 80, 0xffffff); 
        currentZ = -60;

        // Generate track straight forward
        for (let i = 0; i < 50; i++) {
            let gap = 15;
            currentZ -= gap;

            if (i % 5 === 0) {
                // Boost Pad
                createPlatform(0, -2, currentZ - 10, 10, 1, 20, 0x00ff00, true);
                currentZ -= 20;
            } else {
                // Normal Platform
                createPlatform(0, -2, currentZ - 20, 20, 2, 40, 0x333333);
                currentZ -= 40;
            }
        }

        // --- 5. CONTROLS ---
        const keys = { w: false, a: false, s: false, d: false };
        let isGrounded = false;
        
        window.addEventListener('keydown', (e) => {
            if(e.key === 'w') keys.w = true;
            if(e.key === 'a') keys.a = true;
            if(e.key === 's') keys.s = true;
            if(e.key === 'd') keys.d = true;
            if(e.code === 'Space' && isGrounded) {
                playerBody.velocity.y = 15; // Jump
                isGrounded = false;
            }
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'w') keys.w = false;
            if(e.key === 'a') keys.a = false;
            if(e.key === 's') keys.s = false;
            if(e.key === 'd') keys.d = false;
        });

        // Mouse Look
        let pitch = 0, yaw = 0;
        document.body.onclick = () => document.body.requestPointerLock();
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        // Boost Pad Collision Logic
        playerBody.addEventListener("collide", (e) => {
            isGrounded = true; 
            if (e.body.userData && e.body.userData.isBoost) {
                const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, yaw, 0)).normalize();
                playerBody.velocity.x += forward.x * 50;
                playerBody.velocity.z += forward.z * 50;
                playerBody.velocity.y = 8; 
            }
        });

        // --- 6. GAME LOOP ---
        const clock = new THREE.Clock();
        let score = 0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            world.step(1/60, delta, 3);

            // Movement Physics
            const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, yaw, 0)).normalize();
            const right = new THREE.Vector3(1, 0, 0).applyEuler(new THREE.Euler(0, yaw, 0)).normalize();
            const force = 40;

            if (keys.w) playerBody.applyForce(new CANNON.Vec3(forward.x * force, 0, forward.z * force), playerBody.position);
            if (keys.s) playerBody.applyForce(new CANNON.Vec3(-forward.x * force, 0, -forward.z * force), playerBody.position);
            if (keys.a) playerBody.applyForce(new CANNON.Vec3(-right.x * force, 0, -right.z * force), playerBody.position);
            if (keys.d) playerBody.applyForce(new CANNON.Vec3(right.x * force, 0, right.z * force), playerBody.position);

            // UI & FOV Updates
            const speed = Math.floor(playerBody.velocity.length() * 2);
            if (speed > 10) score += speed * delta; // Score goes up based on speed
            
            document.getElementById('speedDisplay').innerText = `VELOCITY: ${speed}`;
            document.getElementById('scoreDisplay').innerText = `STYLE: ${Math.floor(score)}`;
            
            camera.fov = 75 + (speed * 0.3);
            camera.updateProjectionMatrix();

            // Camera Follow
            camera.position.copy(playerBody.position);
            camera.position.y += 0.5; // Put camera at eye level
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // Death Pit Reset
            if (playerBody.position.y < -50) {
                playerBody.position.set(0, 10, 0);
                playerBody.velocity.set(0,0,0);
                yaw = 0; // Reset look direction to forward
                score = 0;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
